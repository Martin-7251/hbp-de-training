version: 2

sources:
  - name: raw
    database: HBP_RAW
    schema: INGEST
    tables:
      - name: dim_customers
        tests:
          - not_null:
              column_name: customer_id
          - unique:
              column_name: customer_id

      - name: dim_products
        tests:
          - not_null:
              column_name: product_id
          - unique:
              column_name: product_id

      - name: fct_orders
        tests:
          - not_null:
              column_name: order_id
          - unique:
              column_name: order_id
          - accepted_values:
              arguments:
                column_name: status
                values: ['pending', 'completed', 'cancelled', 'refunded']

  - name: fivetran_supplier
    database: HBP_RAW
    schema: '"google_sheets"'
    tables:
      - name: supplier_contacts
        identifier: '"supplier_contacts"'
        config:
          # 💡 Fixed: Forced strict lowercase matching for Snowflake metadata columns
          loaded_at_field: '"_fivetran_synced"'
          freshness:
            warn_after: {count: 24, period: hour}
            error_after: {count: 48, period: hour}
        tests:
          - not_null:
              column_name: '"supplier_id"'
          - unique:
              column_name: '"supplier_id"'
